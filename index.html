<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Blog</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Georgia, serif;
      background: #1a1a1a;
      color: #e8e8e8;
      line-height: 1.8;
    }

    header {
      border-bottom: 1px solid #2a2a2a;
      padding: 20px 0;
      text-align: center;
    }

    header h1 {
      font-size: 1.8rem;
    }

    header h1 a {
      text-decoration: none;
      color: #ffffff;
    }

    nav {
      margin-top: 8px;
    }

    nav a {
      margin: 0 12px;
      text-decoration: none;
      color: #aaaaaa;
      font-size: 0.95rem;
    }

    nav a:hover {
      color: #ffffff;
    }

    main {
      max-width: 640px;
      margin: 40px auto;
      padding: 0 20px;
    }

    .post-list {
      list-style: none;
    }

    .post-list li {
      border-bottom: 1px solid #2a2a2a;
      padding: 20px 0;
    }

    .post-list li:last-child {
      border-bottom: none;
    }

    .post-date {
      font-size: 0.85rem;
      color: #666666;
      margin-bottom: 4px;
    }

    .post-title a {
      font-size: 1.25rem;
      font-weight: bold;
      color: #ffffff;
      text-decoration: none;
    }

    .post-title a:hover {
      color: #7eb8f7;
      text-decoration: underline;
    }

    .post-excerpt {
      margin-top: 6px;
      font-size: 0.95rem;
      color: #bbbbbb;
    }

    footer {
      border-top: 1px solid #2a2a2a;
      text-align: center;
      padding: 20px;
      font-size: 0.85rem;
      color: #555555;
      margin-top: 60px;
    }
  </style>
</head>

<body>

  <header>
    <h1><a href="index.html">Onis's Blog</a></h1>
    <nav>
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
    </nav>
  </header>

  <main>
    <ul class="post-list">

      <li>
        <p class="post-date">May 12, 2026</p>
        <p class="post-title"><a href="posts/gaussian-integral.html">What I learned this week</a></p>
        <p class="post-excerpt">A short reflection on the things I discovered, read, and thought about over the past few
          days.</p>
      </li>
    </ul>
  </main>

  <footer>
    © 2026 Onis's Blog
  </footer>

</body>

</html>
